eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
    registry-fetch-interval-seconds: 5
    initial-instance-info-replication-interval-seconds: 5
    heartbeat-interval: 5
spring:
  cloud:
    gateway:
      routes:
        - id: eureka_route
          uri: http://eureka-server:8761
          predicates:
            - Path=/eureka/**
          filters:
            - StripPrefix=1
        - id: kafka_ui_route
          uri: http://kafka-ui:8080
          predicates:
            - Path=/api/kafka/**
          filters:
            - StripPrefix=2
        - id: video-aggregation-service-route
          uri: lb://VIDEO-AGGREGATION-SERVICE
          predicates:
            - Path=/api/video-aggregation-service/**
          filters:
            - StripPrefix=2
        - id: scenario-service-route
          uri: lb://SCENARIO-SERVICE
          predicates:
            - Path=/api/scenario-service/**
          filters:
            - StripPrefix=2
        - id: video-fragments-service-route
          uri: lb://VIDEO-FRAGMENTS-SERVICE
          predicates:
            - Path=/api/video-fragments-service/**
          filters:
            - StripPrefix=2
        - id: input-service-route
          uri: lb://INPUT-SERVICE
          predicates:
            - Path=/api/input-service/**
          filters:
            - StripPrefix=2
        - id: react_ui_fallback_route
          uri: http://react-ui-service:80
          predicates:
            - Path=/**
      discovery:
        locator:
          enabled: true
          lowerCaseServiceId: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://smartshorts.duckdns.org/auth/realms/smart-shorts-realm
          jwk-set-uri: http://keycloak:8080/auth/realms/smart-shorts-realm/protocol/openid-connect/certs
        client:
          registration:
            keycloak:
              client-id: gateway-service
              client-secret: lkbuIDFHvt1LwSH1b8jJBSq2Qn2BmIXf
              authorization-grant-type: client_credentials
              scope: openid